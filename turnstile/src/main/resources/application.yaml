spring:
  application:
    name: turnstile
  profiles:
    active: prod

---
server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: redis
      port: 6379

---
server:
  port: 8090

spring:
  config:
    activate:
      on-profile: dev
  data:
    redis:
      host: localhost
      port: 6379