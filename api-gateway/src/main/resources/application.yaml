spring:
  application:
    name: api-gateway
  profiles:
    active: prod

rate-limiter:
  bucket:
    key: ratelimit
    capacity: 5
    refill-token-amount: 1
    refill-interval-seconds: 60
    redirect-threshold: 100

---
server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - name: api-service-route
              uri: lb://api-service
              predicates:
                - Path=/api/v1/**
              filters:
                - name: RateLimiter
                  args:
                    redirectUri: http://localhost:8080/turnstile/queue/events
            - name: turnstile-route
              uri: http://turnstile:8080
              predicates:
                - Path=/turnstile/**, /.well-known/openid-configuration
    discovery:
      client:
        simple:
          instances:
            api-service:
              - uri: http://app1:8080
              - uri: http://app2:8080
custom:
  auth:
    jwk-set-uri: http://turnstile:8080/.well-known/openid-configuration

---
server:
  port: 8079

spring:
  config:
    activate:
      on-profile: dev
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - name: api-service-route
              uri: lb://api-service
              predicates:
                - Path=/api/v1/**
              filters:
                - name: RateLimiter
                  args:
                    redirectUri: "http://localhost:8083/turnstile/queue/events"
            - name: turnstile-route
              uri: http://localhost:8083
              predicates:
                - Path=/turnstile/**, /.well-known/openid-configuration
    discovery:
      client:
        simple:
          instances:
            api-service:
              - uri: http://localhost:8081
              - uri: http://localhost:8082

custom:
  auth:
    jwk-set-uri: http://localhost:8080/.well-known/openid-configuration